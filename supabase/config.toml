project_id = "my-tasting"

[functions.recognize]
verify_jwt = false

[functions.migrate-notes]
verify_jwt = false

[functions.delete-account]
verify_jwt = false

[auth]
enabled = true
site_url = "https://my-tasting.vercel.app"
additional_redirect_urls = ["https://my-tasting.vercel.app/auth/callback", "http://localhost:5173/auth/callback"]
enable_signup = true
enable_anonymous_sign_ins = true
minimum_password_length = 6

[auth.email]
enable_confirmations = true
otp_length = 6
otp_expiry = 3600

[auth.email.template.confirmation]
subject = "My Tasting - 이메일 인증 코드"
content_path = "./supabase/templates/confirm_signup.html"

[auth.external.kakao]
enabled = true
client_id = "env(AUTH_KAKAO_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_KAKAO_SECRET)"
redirect_uri = "https://gijgpdbuimjimoykxdnd.supabase.co/auth/v1/callback"
skip_nonce_check = false
email_optional = true

[auth.external.google]
enabled = false
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"
redirect_uri = "https://gijgpdbuimjimoykxdnd.supabase.co/auth/v1/callback"
